server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # clean URLs for Astro 'directory' output (/lore -> /lore/index.html)
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  # immutable hashed build assets
  location /_astro/ { expires 1y; add_header Cache-Control "public, immutable"; }
  location /pagefind/ { add_header Cache-Control "public, max-age=3600"; }

  error_page 404 /404.html;
}
